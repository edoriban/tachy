# Release pipeline for Tachy
#
# How to trigger:
#   Push a tag matching `v*` (e.g. `git tag v0.1.0 && git push origin v0.1.0`).
#
# What this workflow does:
#   - Builds the Tauri app on `windows-latest` (Tachy is Windows-only: Mica,
#     Cloud Files API, IContextMenu — it will not run on macOS/Linux).
#   - Produces both bundle targets configured in `src-tauri/tauri.conf.json`:
#       * MSI installer  -> src-tauri/target/release/bundle/msi/*.msi
#       * NSIS installer -> src-tauri/target/release/bundle/nsis/*.exe
#   - Creates a GitHub Release as a DRAFT and uploads both installers as
#     release assets. Review the draft, edit the notes, then publish manually.
#
# Auto-updater:
#   The app uses `tauri-plugin-updater` to check
#   `https://github.com/edoriban/tachy/releases/latest/download/latest.json`
#   on launch. For the workflow to produce a valid `latest.json` (which is
#   required for the updater to accept the new version), TWO repository
#   secrets MUST be configured BEFORE pushing a tag:
#     * TAURI_SIGNING_PRIVATE_KEY          — the contents of `~/.tauri/tachy.key`
#       generated locally with `pnpm tauri signer generate -w ~/.tauri/tachy.key`.
#     * TAURI_SIGNING_PRIVATE_KEY_PASSWORD — the password chosen at key generation.
#   With both secrets set AND `plugins.updater.pubkey` populated in
#   `src-tauri/tauri.conf.json`, `tauri-action` automatically signs each
#   bundle, generates `latest.json`, and uploads it as a release asset
#   alongside the .msi/.exe — no extra flags required.
#
# Future improvements (not configured here):
#   - Code signing (Authenticode certificate via `WINDOWS_CERTIFICATE` /
#     `WINDOWS_CERTIFICATE_PASSWORD` secrets and tauri.conf.json `windows`
#     fields).

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — see header comment. If these are unset, the
          # bundle still builds but `latest.json` will not be generated and
          # installed clients will silently skip the update check.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tachy v__VERSION__"
          releaseBody: |
            ## Tachy v__VERSION__

            Modern, fast file explorer for Windows 11.

            ### Downloads
            - **`.msi`** — Windows Installer package. Recommended for
              enterprise / managed environments and `winget` packaging.
            - **`.exe`** (NSIS) — Lightweight installer with a friendlier
              first-run experience. Recommended for most users.

            See the [README](https://github.com/edoriban/tachy#-download)
            for installation help.

            ---
            _This release was built automatically by GitHub Actions._
          releaseDraft: true
          prerelease: false
